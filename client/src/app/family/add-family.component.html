<div class="flex-row">
  <div class="flex-1">
    <form [formGroup]="addFamilyForm" (ngSubmit)="submitForm();">
      <mat-card class="add-family-card">
        <mat-card-header>
          <mat-card-title class="add-family-title">New Family</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="flex-col">
            <mat-form-field>
              <mat-label>Guardian Name</mat-label>
              <input matInput formControlName="guardian name"
                required>
              @if (formControlHasError('guardian name')) {
                <mat-error data-test="guardianNameError">
                  {{getErrorMessage('guardianName')}}
                </mat-error>
              }
            </mat-form-field>

            <mat-form-field>
              <mat-label>Email</mat-label>
              <input matInput type="email"
                formControlName="email" required>
              @if (formControlHasError('email')) {
                <mat-error data-test="emailError">
                  {{getErrorMessage('email')}}
                </mat-error>
              }
            </mat-form-field>

            <!-- <mat-form-field>
              <mat-label>Company</mat-label>
              <input matInput formControlName="company">
              <mat-hint>Not required in Angular for demonstration, still required by server</mat-hint>
            </mat-form-field> -->

            <mat-form-field>
              <mat-label>Address</mat-label>
              <input matInput type="address"
                formControlName="address" required>
              @if (formControlHasError('address')) {
                <mat-error data-test="addressError">
                  {{getErrorMessage('address')}}
                </mat-error>
              }
            </mat-form-field>

            <!-- <mat-form-field>
              <mat-label>Role</mat-label>
              <mat-select required formControlName="role">
                <mat-option value="admin">Admin</mat-option>
                <mat-option value="editor">Editor</mat-option>
                <mat-option value="viewer">Viewer</mat-option>
              </mat-select>
              @if (formControlHasError('role')) {
                <mat-error data-test="roleError">
                  {{getErrorMessage('role')}}
                </mat-error>
              }
            </mat-form-field> -->
          </div>

        </mat-card-content>
        <mat-card-actions align="end">
          <button
            mat-button
            type="button"
            color="primary"
            [disabled]="!addFamilyForm.valid"
            type="submit"
            data-test="confirmAddFamilyButton"
            >
            ADD FAMILY
          </button>
        </mat-card-actions>
      </mat-card>
    </form>
  </div>
</div>
